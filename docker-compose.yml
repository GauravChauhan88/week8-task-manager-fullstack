version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: taskmanager-postgres
    environment:
      POSTGRES_USER: taskuser
      POSTGRES_PASSWORD: taskpassword
      POSTGRES_DB: taskmanager_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U taskuser -d taskmanager_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  backend:
    build: 
      context: ./backend
      dockerfile: Dockerfile
    container_name: taskmanager-backend
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/taskmanager_db
      - SPRING_DATASOURCE_USERNAME=taskuser
      - SPRING_DATASOURCE_PASSWORD=taskpassword
      - JWT_SECRET=your_super_secret_key_for_jwt_signing_which_needs_to_be_long_enough_for_security
    depends_on:
      db:
        condition: service_healthy

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: taskmanager-frontend
    ports:
      - "3000:3000"
    # 🌟 ADDED THIS BLOCK: The bridge connecting VS Code to the Docker container
    volumes:
      - ./frontend:/app
      - /app/node_modules # Prevents your Windows node_modules from breaking Linux
    environment:
      - VITE_API_URL=http://localhost:8080/api
      - CHOKIDAR_USEPOLLING=true # 🌟 ADDED THIS: Failsafe to force Vite to notice Windows saves
    depends_on:
      - backend

volumes:
  postgres_data: